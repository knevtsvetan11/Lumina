
<mat-toolbar>
  @if(authService.isAdmin()){
  <span class="cinema-title">Manage Cinemas</span>
    <button mat-button class="crt-btn" (click)="openCreateDialog()">Create+</button>

  }
  @else{
    <span class="cinema-title">Cinemas</span>
  }
    
</mat-toolbar>

<div class="cinema-row">
  @for (cinema of cinemas(); track cinema) {
  <div class="cinema-card">
    <img src="assets/cinema-place.jpg" alt="Image" class="cinema-img" />
    <p><strong></strong> {{cinema.name}}</p>
    <p><strong>Location:</strong> {{cinema.location}}</p>
    <button mat-button class="mat-btn" (click)="getScreenings(cinema.id)">Screenings</button>
    @if(authService.isAdmin()){
    <button mat-button class="del-btn" (click)="openDeleteDialog(cinema)">Delete</button>
    <button mat-button class="mat-btn" (click)="openUpdateDialog(cinema)">Edit</button>
    }
  </div>

  }
</div>
