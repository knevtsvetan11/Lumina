<mat-toolbar>
  <h4 class="title">Manage Users</h4>
  <button class="crt-btn" mat-button (click)="openCreateDialog()">Create+</button>
</mat-toolbar>

<div class="main">
  <div class="search">
    <label>Search:</label><mat-icon>search</mat-icon>
    <input
      class="input"
      (input)="applyFilter($event)"
      placeholder="Write email or name..."
      #input
    />
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let user">{{ user.role }}</td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>CreatedAt</th>
        <td mat-cell *matCellDef="let user">{{ user.createdAt }}</td>
      </ng-container>

      <ng-container matColumnDef="isActive">
        <th mat-header-cell *matHeaderCellDef>IsActive</th>
        <td mat-cell *matCellDef="let user">{{ user.isActive }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let user">
          @if (user.isActive) {
            <button mat-button class="unAct-btn" (click)="toggleIsActiveUser(user)">
              Deactivate
            </button>
          } @else {
            <button mat-button class="act-btn" (click)="toggleIsActiveUser(user)">Activate</button>
          }
          <button mat-button class="del-btn" (click)="deleteUser(user)">Delete</button>
        </td>
      </ng-container>

      <tr class="row-header" mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr class="row-data" mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  <mat-paginator class="paginator" [pageSize]="10"></mat-paginator>
</div>
